name: Feature Request
description: Suggest a new capability or enhancement.
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: pitch
    attributes:
      label: What problem does this solve?
      description: Describe the use-case, not just the feature. "I want to ..." or "It's painful to ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Optional. If you've thought about how to implement it, share here.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Other approaches you've thought of, and why this one is preferred.
